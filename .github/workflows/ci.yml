integration-compose:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI .env file
        working-directory: backend
        run: |
          cat <<EOF > .env
          DJANGO_SECRET_KEY=ci-secret-key
          DJANGO_DEBUG=False
          DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost
          DB_NAME=product_review_db
          DB_USER=product_review_user
          DB_PASSWORD=product_review_password
          DB_HOST=db
          DB_PORT=5432
          REDIS_URL=redis://redis:6379/0
          FASTAPI_BASE_URL=http://fastapi:8001
          AWS_ACCESS_KEY_ID=dummy
          AWS_SECRET_ACCESS_KEY=dummy
          AWS_STORAGE_BUCKET_NAME_STATIC=product-review-static1
          AWS_STORAGE_BUCKET_NAME_MEDIA=product-review-media1
          AWS_S3_REGION_NAME=ap-northeast-2
          EOF

      - name: Create CI .env.dev file
        working-directory: backend
        run: |
          cat <<EOF > .env.dev
          DJANGO_ENV=development
          DJANGO_SECRET_KEY=dev-secret-key
          DJANGO_DEBUG=True
          DJANGO_ALLOWED_HOSTS=127.0.0.1,localhost
          DB_NAME=product_review_db
          DB_USER=product_review_user
          DB_PASSWORD=product_review_password
          DB_HOST=db
          DB_PORT=5432
          REDIS_URL=redis://redis:6379/0
          FASTAPI_BASE_URL=http://fastapi:8001
          USE_S3=False
          CELERY_TASK_ALWAYS_EAGER=False
          EOF

      - name: Show docker compose config
        working-directory: backend
        run: |
          docker compose config

      - name: Start full stack with docker compose
        working-directory: backend
        run: |
          docker compose up -d --build

      - name: Wait for containers to initialize
        run: |
          sleep 25

      - name: Show running containers
        working-directory: backend
        run: |
          docker compose ps

      - name: Backend health check
        run: |
          curl -f http://127.0.0.1:8000/admin/login/

      - name: FastAPI health check
        run: |
          curl -f http://127.0.0.1:8001/

      - name: Celery container check
        working-directory: backend
        run: |
          docker compose ps celery

      - name: Print logs if failed
        if: failure()
        working-directory: backend
        run: |
          docker compose logs --no-color

      - name: Shutdown containers
        if: always()
        working-directory: backend
        run: |
          docker compose down -v
